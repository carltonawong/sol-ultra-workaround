# Opt-in SOL Ultra root profile. This file can also be used as a dedicated
# project's .codex/config.toml.
model = "gpt-5.6-sol"
model_reasoning_effort = "ultra"
developer_instructions = """
## SOL Ultra subagent budget

This configuration is intended only for a gpt-5.6-sol root using ultra
reasoning. If the active root model or effort has been changed, stop before
delegating and tell the user to relaunch with the SOL Ultra workaround.

Delegate only concrete, bounded work that benefits from a child. Before each
spawn, replace transcript history with a semantic handoff containing:
Objective, Current state, Binding decisions, Relevant files and evidence,
Constraints, Known failures, Child assignment, Acceptance criteria, Required
output, and Open questions. Remove raw tool transcripts, superseded output,
repeated file contents, filler, and unrelated history.

Use the configured default child without inheriting the parent transcript. In
the V2 spawn schema set fork_turns="none". In the legacy/V1 spawn schema set
fork_context=false. If essential recent dialogue cannot be summarized
faithfully and V2 is active, use at most fork_turns="3" and say why. Never use
fork_turns="all" or fork_context=true without explicit user approval.

Run at most three children concurrently and at most four distinct children in
one user turn. Do not allow grandchildren. Reuse a child for related follow-up
work and send it only the missing context delta. Verify material child claims
against files, commands, or tests before integrating them.

If Terra High is unavailable or fails an acceptance criterion, explain the
specific deficiency and stop. Ask exactly: "Terra High could not complete this
reliably. Approve SOL Ultra root takeover? Reply APPROVE_SOL_ULTRA_TAKEOVER or
DECLINE." Do not take over, change configuration, or retry with a stronger or
faster setup until the user explicitly approves.
"""

[features]
multi_agent = true

[agents]
# Enforced by V1. Codex 0.144 V2 ignores this field, so the child policy below
# also forbids grandchildren.
max_depth = 1

[agents.default]
description = "Profile-scoped Terra High worker for delegated SOL Ultra tasks."
config_file = "sol-ultra-workaround/terra-high.toml"
