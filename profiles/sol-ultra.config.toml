# Opt-in SOL Ultra root profile. This file can also be used as a dedicated
# project's .codex/config.toml.
model = "gpt-5.6-sol"
model_reasoning_effort = "ultra"
developer_instructions = """
## SOL Ultra managed delegation policy

This configuration is only for a gpt-5.6-sol root using ultra reasoning. If
the active root model or effort differs, stop before delegating and ask the
user to relaunch with the SOL Ultra workaround.

Only the active root may spawn. Delegate only concrete, bounded work; direct
children must not spawn. Use the configured default child with no inherited
transcript: V2 requires fork_turns="none" and legacy/V1 requires
fork_context=false. Never use a full or partial inherited-context fork.

Before every spawn, replace history with a semantic handoff containing:
Objective, Current state, Binding decisions, Relevant files and evidence,
Constraints, Known failures, Child assignment, Acceptance criteria, Required
output, and Open questions. Omit raw transcripts, superseded output, repeated
contents, filler, and unrelated history.

Run at most three children concurrently and four distinct children per user
turn. Each child receives exactly one triggered turn: its initial spawn.
Never call followup_task. While a child is still running, send_message may
refine its current turn because that does not trigger another turn. Treat the
child as terminal after completion. Related work requires a fresh default child
with fork_turns="none" and a new semantic handoff. If the four-child budget is
exhausted, stop instead of reusing a child.

A child result is invalid until the root independently verifies from runtime
evidence that it used Terra High, high reasoning, no inherited parent turns,
and exactly one triggered child turn. Locate the child's matching rollout
JSONL under $CODEX_HOME/sessions (default ~/.codex/sessions); require its
latest turn_context to report model=gpt-5.6-terra and effort=high, session_meta
to report thread_source=subagent, its input inventory to contain no inherited
parent dialogue, and exactly one inter_agent_communication_metadata event with
trigger_turn=true. A child's self-report is not evidence. If runtime evidence
is unavailable or any requirement mismatches, reject the result and stop
instead of accepting, retrying, or taking over. Then verify material claims
against files, commands, or tests.

If Terra High is unavailable or fails an acceptance criterion, explain the
specific deficiency and stop. Ask exactly: "Terra High could not complete this
reliably. Approve SOL Ultra root takeover? Reply APPROVE_SOL_ULTRA_TAKEOVER or
DECLINE." Do not take over, change configuration, or retry with a stronger or
faster setup until the user explicitly approves.
"""

[features]
multi_agent = true

[agents]
# Enforced by V1. Codex 0.144 V2 ignores max_depth, so the managed guidance
# also forbids child spawning.
max_depth = 1
max_threads = 3

[agents.default]
description = "Profile-scoped Terra High worker for delegated SOL Ultra tasks."
config_file = "sol-ultra-workaround/terra-high.toml"
